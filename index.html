<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VR / XR Festival Tracker — Reality Looks Back</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── THEME TOKENS ── */
[data-theme="dark"]{
  --bg:#0D0F10;--bg2:#141618;--bg3:#1C1F21;--bg4:#242729;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --ink:#F0EDE8;--ink2:#A8A49E;--ink3:#6A6762;
  --shadow:rgba(0,0,0,0.4);
  --card-hover:0 2px 20px rgba(0,0,0,0.35);
}
[data-theme="light"]{
  --bg:#F4F3EF;--bg2:#FDFCFA;--bg3:#EEEDEA;--bg4:#E5E4E0;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --ink:#1A1714;--ink2:#5A5650;--ink3:#9A9590;
  --shadow:rgba(0,0,0,0.08);
  --card-hover:0 2px 20px rgba(0,0,0,0.10);
}
:root{
  --green:#3ECF8E;--green-dim:rgba(62,207,142,0.12);
  --amber:#D97706;--amber-dim:rgba(217,119,6,0.12);
  --red:#E53E3E;--red-dim:rgba(229,62,62,0.10);
  --blue:#3B82F6;--blue-dim:rgba(59,130,246,0.12);
  --purple:#8B5CF6;--purple-dim:rgba(139,92,246,0.12);
  --teal:#0EA5E9;--teal-dim:rgba(14,165,233,0.12);
  --radius:10px;--radius-lg:14px;
  --font-head:'Syne',sans-serif;--font-body:'Inter',sans-serif;
}
[data-theme="light"]{
  --green:#16A34A;--green-dim:rgba(22,163,74,0.10);
  --amber:#B45309;--amber-dim:rgba(180,83,9,0.10);
  --red:#DC2626;--red-dim:rgba(220,38,38,0.08);
  --blue:#2563EB;--blue-dim:rgba(37,99,235,0.10);
  --purple:#7C3AED;--purple-dim:rgba(124,58,237,0.10);
  --teal:#0284C7;--teal-dim:rgba(2,132,199,0.10);
}

body{font-family:var(--font-body);background:var(--bg);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.6;transition:background 0.2s,color 0.2s}

/* HEADER */
.site-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0.55rem 2rem}
.header-inner{max-width:1040px;margin:0 auto}
.header-top{display:flex;justify-content:space-between;align-items:center;gap:0.75rem;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap;min-width:0}
.eyebrow{font-family:var(--font-head);font-size:9px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:var(--green);white-space:nowrap}
h1{font-family:var(--font-head);font-size:0.9rem;font-weight:600;color:var(--ink);line-height:1;white-space:nowrap}
h1 span{color:var(--ink3);font-weight:400}
.header-divider{color:var(--border2);font-size:14px;user-select:none}
.project-pill{display:inline-flex;align-items:center;gap:5px;font-size:10px;color:var(--purple);background:var(--purple-dim);border:1px solid rgba(139,92,246,0.2);border-radius:99px;padding:2px 8px;white-space:nowrap}
.header-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.btn-sm{display:flex;align-items:center;gap:5px;font-family:var(--font-body);font-size:11px;font-weight:500;padding:5px 11px;border-radius:99px;border:1px solid var(--border2);background:var(--bg3);color:var(--ink2);cursor:pointer;white-space:nowrap;transition:all 0.15s}
.btn-sm:hover{border-color:var(--green);color:var(--green)}
.btn-sm:disabled{opacity:0.5;cursor:not-allowed}
.theme-btn{font-size:13px;padding:5px 8px}
.spin.active{animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.header-meta{display:none}
.mdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* AI BAR */
.ai-wrap{max-width:1040px;margin:0 auto;padding:0 2rem}
.ai-status{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:11px;color:var(--ink3);padding:5px 13px;border-radius:0 0 var(--radius) var(--radius);background:var(--bg3);border:1px solid var(--border);border-top:none}
.ai-status.ok{color:var(--green)}
.ai-status.err{color:var(--amber)}
.ai-meta-pills{display:flex;gap:1rem;flex-wrap:wrap;margin-left:auto}
.meta-pill{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--ink3)}
#ai-ts{font-size:10px;color:var(--ink3);padding-left:0.75rem;border-left:1px solid var(--border2)}

/* MAIN */
main{max-width:1040px;margin:0 auto;padding:1rem 1.5rem 5rem}

/* STATUS FILTER BAR (replaces big stat cards) */
.status-bar{display:flex;gap:5px;align-items:center;margin-bottom:0.85rem;flex-wrap:wrap}
.sf-btn{display:flex;align-items:center;gap:5px;font-family:var(--font-body);font-size:11px;font-weight:500;padding:4px 12px 4px 9px;border-radius:99px;border:1px solid var(--border2);background:var(--bg2);color:var(--ink3);cursor:pointer;transition:all 0.12s;white-space:nowrap}
.sf-btn:hover{color:var(--ink2);border-color:var(--border2)}
.sf-btn.active{background:var(--bg3);color:var(--ink);border-color:var(--border2)}
.sf-btn .sfdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sf-btn .sfn{font-family:var(--font-head);font-size:13px;font-weight:600;line-height:1}
.sf-total{font-size:10px;color:var(--ink3);margin-left:auto;white-space:nowrap}

/* STATS (hidden, kept for tab count updates) */
.stats-row{display:none}

/* LEGEND */
.legend{display:flex;gap:1rem;flex-wrap:wrap;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:0.65rem 1rem;margin-bottom:1.25rem;font-size:11px;color:var(--ink2)}
.li{display:flex;align-items:center;gap:5px}
.ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* TABS */
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.1rem;overflow-x:auto;gap:0}
.tab-btn{font-family:var(--font-body);font-size:12px;padding:9px 14px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--ink3);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0}
.tab-btn:hover{color:var(--ink2)}
.tab-btn.active{color:var(--ink);border-bottom-color:var(--green)}
.tc{font-size:10px;background:var(--bg3);color:var(--ink3);padding:1px 6px;border-radius:99px;border:1px solid var(--border)}
.tab-btn.active .tc{background:var(--green-dim);color:var(--green);border-color:transparent}

/* FILTER */
.filter-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1.1rem;align-items:center}
.fb{font-family:var(--font-body);font-size:11px;padding:4px 12px;border-radius:99px;border:1px solid var(--border2);background:transparent;color:var(--ink3);cursor:pointer;transition:all 0.12s}
.fb:hover{color:var(--ink2)}
.fb.active{background:var(--bg3);color:var(--ink);border-color:var(--border2)}
.sort-box{display:inline-flex;align-items:center;gap:4px;margin-left:auto;padding:0 8px;border-left:1px solid var(--border2)}
.sort-lbl{font-family:var(--font-body);font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--ink3);margin-right:4px}
.sb{font-family:var(--font-body);font-size:11px;padding:4px 10px;border-radius:99px;border:1px solid var(--border2);background:transparent;color:var(--ink3);cursor:pointer;transition:all 0.12s}
.sb:hover{color:var(--ink2)}
.sb.active{background:var(--purple-dim);color:var(--purple);border-color:transparent}
.cal-event{border-left-color:var(--blue) !important;background:var(--blue-dim) !important}
.cal-event .cal-d,.cal-event .cal-m{color:var(--blue) !important}
.search-box{font-family:var(--font-body);font-size:12px;padding:5px 12px;border-radius:99px;border:1px solid var(--border2);background:var(--bg3);color:var(--ink);outline:none;margin-left:auto;width:200px}
.search-box::placeholder{color:var(--ink3)}
.search-box:focus{border-color:var(--green)}

/* SECTION DIVIDER */
.sh{display:flex;align-items:center;gap:8px;margin:1.5rem 0 0.65rem}
.sh:first-child{margin-top:0}
.sh-txt{font-family:var(--font-head);font-size:9px;font-weight:600;letter-spacing:0.13em;text-transform:uppercase;white-space:nowrap}
.sh-open{color:var(--green)}
.sh-watch{color:var(--amber)}
.sh-closed{color:var(--ink3)}
.sh-no{color:var(--red)}
.sh-line{flex:1;height:1px;background:var(--border)}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1rem 1rem 1.3rem;margin-bottom:7px;transition:border-color 0.15s,box-shadow 0.15s;position:relative;overflow:hidden}
.card:hover{border-color:var(--border2);box-shadow:var(--card-hover)}
.card.is-sub{border-color:rgba(62,207,142,0.22);background:var(--green-dim)}
.card.from-csv{border-left-color:rgba(139,92,246,0.35)}
.card.from-dome{border-left-color:rgba(245,166,35,0.35)}
.cb{position:absolute;left:0;top:0;bottom:0;width:3px}
.cb-open{background:var(--green)}
.cb-watch{background:var(--amber)}
.cb-closed{background:var(--ink3)}
.cb-no{background:var(--red)}
.cb-sub{background:linear-gradient(180deg,var(--green),var(--blue))}
.cb-pdf{background:var(--teal)}

.ct{display:flex;justify-content:space-between;align-items:flex-start;gap:0.65rem;margin-bottom:0.25rem}
.cn{font-family:var(--font-head);font-size:0.9rem;font-weight:500;color:var(--ink);line-height:1.3}
.card.is-sub .cn{color:var(--ink2)}

/* BADGES */
.badge{font-size:10px;font-weight:500;padding:2px 9px;border-radius:99px;white-space:nowrap;flex-shrink:0}
.b-open{background:var(--green-dim);color:var(--green)}
.b-watch{background:var(--amber-dim);color:var(--amber)}
.b-closed{background:rgba(168,164,158,0.12);color:var(--ink3)}
.b-no{background:var(--red-dim);color:var(--red)}
.b-sub{background:var(--blue-dim);color:var(--blue)}
.b-pdf{background:var(--teal-dim);color:var(--teal)}
.b-csv{background:var(--purple-dim);color:var(--purple);font-size:9px;padding:1px 7px;margin-left:3px}
.b-selected{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(59,130,246,0.5);font-weight:600}
.b-disq{background:var(--red-dim);color:var(--red)}
.b-notsel{background:rgba(168,164,158,0.12);color:var(--ink3)}

.cmeta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:0.5rem;font-size:11px;color:var(--ink3)}
.cmeta strong{color:var(--ink2);font-weight:400}

/* CSV ROW */
.csvrow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:0.5rem;font-size:11px;color:var(--ink3)}
.csvrow .tracking{font-family:monospace;font-size:10px;opacity:0.6}

/* TAGS */
.tags{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:0.6rem}
.tag{font-size:10px;padding:2px 7px;border-radius:99px;border:1px solid var(--border2);color:var(--ink3);background:var(--bg3)}

/* AI UPDATE BANNER */
.ai-upd{font-size:11px;color:var(--amber);background:var(--amber-dim);border:1px solid rgba(217,119,6,0.18);border-radius:var(--radius);padding:5px 9px;margin-bottom:0.55rem}

.cnotes{font-size:12px;color:var(--ink2);line-height:1.6;margin-bottom:0.75rem}

/* CARD FOOTER */
.cf{display:flex;justify-content:space-between;align-items:center;gap:0.5rem;flex-wrap:wrap}
.portal-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;color:var(--ink2);text-decoration:none;padding:4px 12px;border:1px solid var(--border2);border-radius:99px;background:var(--bg3);transition:all 0.15s}
.portal-link:hover{border-color:var(--green);color:var(--green)}
.sub-toggle{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:4px 12px;border-radius:99px;border:1px solid var(--border2);background:transparent;color:var(--ink3);cursor:pointer;transition:all 0.15s}
.sub-toggle:hover{color:var(--green);border-color:rgba(62,207,142,0.4)}
.card.is-sub .sub-toggle{color:var(--blue);border-color:rgba(59,130,246,0.4);background:var(--blue-dim)}
.vc{font-size:10px;color:var(--ink3)}
.vc.ok{color:var(--green);opacity:0.75}

/* SUBMITTED PANEL */
#sub-panel{max-width:1040px;margin:0 auto;padding:0 1.5rem 4rem}
.sub-section{background:var(--green-dim);border:1px solid rgba(62,207,142,0.18);border-radius:var(--radius-lg);padding:1.1rem}
.sub-section h2{font-family:var(--font-head);font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--green);margin-bottom:0.85rem;display:flex;align-items:center;gap:8px}
.sub-section h2::after{content:'';flex:1;height:1px;background:rgba(62,207,142,0.2)}
.sub-row{display:flex;align-items:center;justify-content:space-between;gap:0.75rem;padding:0.5rem 0;border-bottom:1px solid rgba(62,207,142,0.1);flex-wrap:wrap}
.sub-row:last-child{border-bottom:none}
.sub-name{font-size:12px;font-weight:500}
.sub-meta{font-size:11px;color:var(--ink3)}
.unsub-btn{font-size:10px;color:var(--ink3);background:transparent;border:1px solid var(--border);border-radius:99px;padding:2px 9px;cursor:pointer;transition:all 0.12s}
.unsub-btn:hover{color:var(--red);border-color:rgba(229,62,62,0.4)}

.award-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:0.6rem}
.award-chip{font-size:10px;padding:2px 9px;border-radius:99px;background:rgba(245,166,35,0.12);border:1px solid rgba(245,166,35,0.25);color:var(--amber);white-space:nowrap}
.empty-state{padding:2rem;text-align:center;color:var(--ink3);font-size:13px}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(13,15,16,0.8);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:1rem}
.overlay.show{display:flex}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite}
.overlay-txt{font-size:12px;color:var(--ink2);text-align:center;max-width:240px}

@media(max-width:600px){
  .ct{flex-direction:column}
  .badge{align-self:flex-start}
  .header-top{flex-direction:column}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .search-box{width:100%;margin-left:0}
}

/* ── EDIT MODAL ── */
.modal-back{display:none;position:fixed;inset:0;background:rgba(13,15,16,0.78);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;padding:1rem;overflow-y:auto}
.modal-back.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);max-width:560px;width:100%;max-height:90vh;overflow-y:auto;padding:1.4rem 1.4rem 1.2rem;box-shadow:0 10px 40px rgba(0,0,0,0.4)}
.modal h2{font-family:var(--font-head);font-size:1rem;font-weight:600;margin-bottom:1rem;color:var(--ink);display:flex;align-items:center;justify-content:space-between}
.modal-close{background:transparent;border:none;color:var(--ink3);font-size:18px;cursor:pointer;padding:0 4px;line-height:1}
.modal-close:hover{color:var(--ink)}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:0.7rem}
.field label{font-size:11px;font-weight:500;color:var(--ink2);text-transform:uppercase;letter-spacing:0.04em}
.field input,.field select,.field textarea{font-family:var(--font-body);font-size:13px;padding:7px 10px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg3);color:var(--ink);outline:none;transition:border-color 0.15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green)}
.field textarea{resize:vertical;min-height:70px;font-family:var(--font-body);line-height:1.5}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem}
.field-check{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink2);margin-bottom:0.7rem}
.modal-foot{display:flex;justify-content:space-between;gap:8px;margin-top:1rem;padding-top:0.8rem;border-top:1px solid var(--border);flex-wrap:wrap}
.btn-pri{font-family:var(--font-body);font-size:12px;font-weight:500;padding:8px 16px;border-radius:99px;border:none;background:var(--green);color:#0D0F10;cursor:pointer;transition:all 0.15s}
.btn-pri:hover{opacity:0.9}
.btn-sec{font-family:var(--font-body);font-size:12px;font-weight:500;padding:8px 14px;border-radius:99px;border:1px solid var(--border2);background:var(--bg3);color:var(--ink2);cursor:pointer;transition:all 0.15s}
.btn-sec:hover{color:var(--ink)}
.btn-danger{font-family:var(--font-body);font-size:12px;font-weight:500;padding:8px 14px;border-radius:99px;border:1px solid rgba(229,62,62,0.4);background:transparent;color:var(--red);cursor:pointer;transition:all 0.15s}
.btn-danger:hover{background:var(--red-dim)}

/* ── CALENDAR ── */
.calendar-view{display:flex;flex-direction:column;gap:1.4rem}
.cal-month{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.1rem 0.85rem}
.cal-month h3{font-family:var(--font-head);font-size:11px;font-weight:600;letter-spacing:0.13em;text-transform:uppercase;color:var(--green);margin-bottom:0.85rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border)}
.cal-row{display:flex;align-items:flex-start;gap:0.85rem;padding:0.6rem 0;border-bottom:1px solid var(--border)}
.cal-row:last-child{border-bottom:none}
.cal-row.past{opacity:0.45}
.cal-date{flex-shrink:0;width:54px;background:var(--bg3);border-radius:var(--radius);padding:6px 4px;text-align:center;border:1px solid var(--border)}
.cal-d{font-family:var(--font-head);font-size:1.4rem;font-weight:600;line-height:1;color:var(--ink)}
.cal-m{font-size:9px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink3);margin-top:2px}
.cal-info{flex:1;min-width:0}
.cal-name{font-family:var(--font-head);font-size:0.9rem;font-weight:500;color:var(--ink);margin-bottom:3px;line-height:1.3}
.cal-meta{font-size:11px;color:var(--ink2);margin-bottom:2px}
.cal-meta-2{font-size:11px;color:var(--ink3)}
.cal-days{color:var(--amber);font-weight:500}
.cal-row.past .cal-days{color:var(--ink3)}
.btn-icon{background:transparent;border:1px solid var(--border2);color:var(--ink3);font-size:12px;padding:4px 9px;border-radius:99px;cursor:pointer;flex-shrink:0;transition:all 0.15s}
.btn-icon:hover{color:var(--green);border-color:var(--green)}

/* STATUS INLINE BUTTONS */
.status-btns{display:flex;gap:3px;flex-shrink:0}
.qs-btn{font-family:var(--font-body);font-size:10px;font-weight:500;padding:3px 8px;border-radius:99px;border:1px solid var(--border2);background:transparent;color:var(--ink3);cursor:pointer;transition:all 0.12s;white-space:nowrap;line-height:1.4}
.qs-btn:hover{color:var(--ink2);border-color:var(--border2)}
.qs-btn.qs-active-open{background:var(--green-dim);color:var(--green);border-color:rgba(62,207,142,0.35)}
.qs-btn.qs-active-watch{background:var(--amber-dim);color:var(--amber);border-color:rgba(217,119,6,0.35)}
.qs-btn.qs-active-closed{background:var(--bg3);color:var(--ink2);border-color:var(--border2)}
.qs-btn.qs-active-no{background:var(--red-dim);color:var(--red);border-color:rgba(229,62,62,0.35)}

/* COLLAPSE TOGGLE */
.collapse-btn{font-family:var(--font-body);font-size:11px;padding:4px 10px;border-radius:99px;border:1px solid var(--border2);background:var(--bg3);color:var(--ink3);cursor:pointer;transition:all 0.12s;white-space:nowrap;display:flex;align-items:center;gap:4px}
.collapse-btn:hover{color:var(--ink2)}
.card .ct{cursor:pointer;user-select:none}
.card.collapsed .csvrow,.card.collapsed .tags,
.card.collapsed .award-row,.card.collapsed .ai-upd,.card.collapsed .cnotes,
.card.collapsed .cf,.card.collapsed .cmeta{display:none}
.card.collapsed{padding-bottom:0.6rem}
.card-mini-info{display:none;font-size:10px;color:var(--ink3);margin-top:3px;line-height:1.4}
.card.collapsed .card-mini-info{display:block}

/* ── ADD BUTTON ── */
.add-btn{background:var(--green-dim);border-color:rgba(62,207,142,0.35);color:var(--green)}

<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-top">
      <div class="header-left">
        <span class="eyebrow">Filmmaker's Tracker</span>
        <span class="header-divider">·</span>
        <h1>VR / XR / Immersive Festivals <span>2026–2027</span></h1>
        <div class="project-pill">◈ Reality Looks Back</div>
      </div>
      <div class="header-actions">
        <button class="btn-sm theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle light/dark">🌙</button>
        <button class="btn-sm add-btn" onclick="openAdd()" title="Add a new festival">+ Add festival</button>
        <button class="btn-sm" id="refresh-btn" onclick="runAI()">
          <span class="spin" id="spin-icon">⟳</span>
          <span id="rlabel">AI check for updates</span>
        </button>
      </div>
    </div>
  </div>
</header>
<div class="ai-wrap">
  <div class="ai-status" id="ai-bar" style="display:none">
    <span>◎</span><span id="ai-txt"></span>
    <div class="ai-meta-pills">
      <span id="ai-ts"></span>
    </div>
  </div>
</div>

<main>
  <div class="stats-row" id="stats"></div>
  <div class="status-bar" id="status-bar">
    <button class="sf-btn active" id="sf-all" onclick="setStatusFilter('all',this)"><span class="sfn" id="sf-n-all">—</span> All</button>
    <button class="sf-btn" id="sf-open" onclick="setStatusFilter('open',this)"><span class="sfdot" style="background:var(--green)"></span><span class="sfn" id="sf-n-open">—</span> Open</button>
    <button class="sf-btn" id="sf-watch" onclick="setStatusFilter('watch',this)"><span class="sfdot" style="background:var(--amber)"></span><span class="sfn" id="sf-n-watch">—</span> Watchlist</button>
    <button class="sf-btn" id="sf-closed" onclick="setStatusFilter('closed',this)"><span class="sfdot" style="background:var(--ink3)"></span><span class="sfn" id="sf-n-closed">—</span> Closed</button>
    <button class="sf-btn" id="sf-no" onclick="setStatusFilter('no',this)"><span class="sfdot" style="background:var(--red)"></span><span class="sfn" id="sf-n-no">—</span> No XR</button>
    <span class="sf-total" id="sf-total"></span>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="all" onclick="setTab('all',this)">All <span class="tc" id="c-all">—</span></button>
    <button class="tab-btn" data-tab="open" onclick="setTab('open',this)">Open now <span class="tc" id="c-open">—</span></button>
    <button class="tab-btn" data-tab="watch" onclick="setTab('watch',this)">Watch list <span class="tc" id="c-watch">—</span></button>
    <button class="tab-btn" data-tab="need" onclick="setTab('need',this)">Need to submit <span class="tc" id="c-need">—</span></button>
    <button class="tab-btn" data-tab="calendar" onclick="setTab('calendar',this)">Calendar <span class="tc" id="c-cal">—</span></button>
    <button class="tab-btn" data-tab="csv" onclick="setTab('csv',this)">FilmFreeway <span class="tc" id="c-csv">—</span></button>
    <button class="tab-btn" data-tab="dome" onclick="setTab('dome',this)">Dome/Fulldome <span class="tc" id="c-dome">—</span></button>
    <button class="tab-btn" data-tab="submitted" onclick="setTab('submitted',this)">Submitted <span class="tc" id="c-sub">—</span></button>
  </div>

  <div class="filter-row" id="filter-row">
    <button class="fb active" data-f="all" onclick="setFilter('all',this)">All</button>
    <button class="fb" data-f="Europe" onclick="setFilter('Europe',this)">Europe</button>
    <button class="fb" data-f="North America" onclick="setFilter('North America',this)">N. America</button>
    <button class="fb" data-f="Asia-Pacific" onclick="setFilter('Asia-Pacific',this)">Asia-Pacific</button>
    <button class="fb" data-f="Latin America" onclick="setFilter('Latin America',this)">Latin America</button>
    <button class="fb" data-f="Middle East" onclick="setFilter('Middle East',this)">Middle East</button>
    <div class="sort-box">
      <span class="sort-lbl">Sort:</span>
      <button class="sb active" data-s="dl" id="sb-dl" onclick="setSort('dl',this)">Deadline ↑</button>
      <button class="sb" data-s="ev" id="sb-ev" onclick="setSort('ev',this)">Event date</button>
      <button class="sb" data-s="name" id="sb-name" onclick="setSort('name',this)">Name</button>
      <button class="collapse-btn" id="collapse-btn" onclick="toggleCollapse()" style="margin-left:8px">⊟ Collapse all</button>
    </div>
    <input class="search-box" id="srch" placeholder="Search…" oninput="render()">
  </div>

  <div id="list"></div>
</main>

<div class="data-bar" id="data-bar">
  <div class="data-bar-inner">
    <span style="font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:0.06em;margin-right:4px">Your data:</span>
    <button class="btn-data" onclick="exportChanges()">↓ Export changes</button>
    <button class="btn-data import" onclick="document.getElementById('import-file').click()">↑ Import changes</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importChanges(event)">
    <span id="export-hint" style="font-size:10px;color:var(--ink3);margin-left:4px"></span>
  </div>
</div>

<div id="sub-panel" style="display:none">
  <div class="sub-section">
    <h2>Submitted — Reality Looks Back</h2>
    <div id="sub-list"></div>
  </div>
</div><div class="overlay" id="overlay">
  <div class="spinner"></div>
  <div class="overlay-txt" id="overlay-txt">Asking Claude to check all festivals…</div>
</div>

<div class="modal-back" id="edit-modal">
  <div class="modal">
    <h2><span id="edit-modal-title">Edit festival</span><button class="modal-close" onclick="closeEdit()">×</button></h2>
    <input type="hidden" id="edit-id">
    <div class="field"><label>Festival name *</label><input type="text" id="edit-name" placeholder="e.g. Venice Immersive"></div>
    <div class="field-row">
      <div class="field"><label>Location</label><input type="text" id="edit-loc" placeholder="e.g. Venice, Italy"></div>
      <div class="field"><label>Region</label>
        <select id="edit-region">
          <option>Europe</option><option>North America</option><option>Asia-Pacific</option>
          <option>Latin America</option><option>Middle East</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label>Festival event dates</label><input type="text" id="edit-dates" placeholder="e.g. Sept 2–12, 2026"></div>
      <div class="field"><label>Status</label>
        <select id="edit-status">
          <option value="open">Open now</option>
          <option value="watch">Watch / future</option>
          <option value="closed">Closed / past</option>
          <option value="no">Not accepting XR</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label>Submission deadline (display)</label><input type="text" id="edit-dl" placeholder="e.g. May 7, 2026"></div>
      <div class="field"><label>Deadline (YYYY-MM-DD, for sorting)</label><input type="date" id="edit-dls"></div>
    </div>
    <div class="field"><label>Web link / portal URL</label><input type="url" id="edit-url" placeholder="https://…"></div>
    <div class="field"><label>Tags (comma separated — include "VR", "XR", "Dome", etc.)</label><input type="text" id="edit-tags" placeholder="VR, AR, XR, Installation"></div>
    <div class="field"><label>Source / category</label>
      <select id="edit-src">
        <option value="pdf">Research list</option>
        <option value="csv">FilmFreeway submission</option>
        <option value="both">Both portal + FilmFreeway</option>
        <option value="dome">Dome / Fulldome</option>
      </select>
    </div>
    <div class="field"><label>Notes</label><textarea id="edit-notes" placeholder="Free-form notes — accepted formats, prizes, history, anything you want to remember…"></textarea></div>
    <div class="field-check"><input type="checkbox" id="edit-verified"><label for="edit-verified" style="text-transform:none;letter-spacing:0;font-size:12px;color:var(--ink2);font-weight:400">I've verified this entry against the official portal</label></div>
    <div class="modal-foot">
      <button class="btn-danger" id="edit-delete-btn" onclick="deleteEntry()">Delete entry</button>
      <div style="display:flex;gap:8px;margin-left:auto">
        <button class="btn-sec" onclick="closeEdit()">Cancel</button>
        <button class="btn-pri" onclick="saveEdit()">Save changes</button>
      </div>
    </div>
  </div>
</div>

const seen = new Set();
const STATIC_FESTIVALS = DB.filter(f => { if(seen.has(f.id)){return false;} seen.add(f.id); return true; });

/* ── PERSISTED STATE ──
   rlb_sub      — set of festival ids you've submitted to
   rlb_need     — set of festival ids on your "need to submit" list
   rlb_selected — set of festival ids you've been SELECTED for (accepted)
   rlb_edits    — per-id partial edits applied on top of static entries
   rlb_custom   — array of fully custom festivals you added
   rlb_ai       — AI-suggested updates (kept separate from your manual edits)
   rlb_theme    — light/dark
   rlb_sort     — sort mode: dl | ev | name
*/
let submitted = new Set(JSON.parse(localStorage.getItem('rlb_sub')||'[]'));
let needSubmit = new Set(JSON.parse(localStorage.getItem('rlb_need')||'[]'));
let selectedSet = new Set(JSON.parse(localStorage.getItem('rlb_selected')||'[]'));

let customFestivals = JSON.parse(localStorage.getItem('rlb_custom')||'[]');
let aiUpdates = JSON.parse(localStorage.getItem('rlb_ai')||'{}');
let isDark = localStorage.getItem('rlb_theme') !== 'light';
let currentSort = localStorage.getItem('rlb_sort') || 'dl';
let inCalendar = new Set(JSON.parse(localStorage.getItem('rlb_cal')||'[]'));

let festivals = [];

let collapsedAll = localStorage.getItem('rlb_collapsed') === '1';
let currentStatusFilter = localStorage.getItem('rlb_sf') || 'all';
let sortDir = localStorage.getItem('rlb_sortdir') || 'asc';

function buildFestivals(){
  const all = [...STATIC_FESTIVALS, ...customFestivals];
  return all.map(f => {
    let out = JSON.parse(JSON.stringify(f));
    const ai = aiUpdates[f.id];
    if(ai){
      if(ai.deadline) out.dl = ai.deadline;
      if(ai.dls) out.dls = ai.dls;
      if(ai.status) out.status = ai.status;
      if(ai.note) out.aiNote = ai.note;
    }
    const edit = userEdits[f.id];
    if(edit){
      Object.keys(edit).forEach(k => { out[k] = edit[k]; });
    }
    return out;
  });
}
function rebuild(){ festivals = buildFestivals(); render(); }

function persist(){
  localStorage.setItem('rlb_sub', JSON.stringify([...submitted]));
  localStorage.setItem('rlb_need', JSON.stringify([...needSubmit]));
  localStorage.setItem('rlb_selected', JSON.stringify([...selectedSet]));
  localStorage.setItem('rlb_edits', JSON.stringify(userEdits));
  localStorage.setItem('rlb_custom', JSON.stringify(customFestivals));
  localStorage.setItem('rlb_cal', JSON.stringify([...inCalendar]));
}

/* ── EVENT-DATE PARSER ──
   Pulls a YYYY-MM-DD start date out of a free-form `dates` string like
   "Sept 2–12, 2026", "Oct 2026", "March 2027", "Jan 30–Feb 1, 2026".
   Returns '2099-01-01' if nothing parseable. */
const MONTH_MAP = {jan:0,january:0,feb:1,february:1,mar:2,march:2,apr:3,april:3,may:4,jun:5,june:5,jul:6,july:6,aug:7,august:7,sep:8,sept:8,september:8,oct:9,october:9,nov:10,november:10,dec:11,december:11};
function eventDateFromDates(s){
  if(!s) return '2099-01-01';
  const str = String(s);
  const yMatch = str.match(/(20\d{2})/);
  if(!yMatch) return '2099-01-01';
  const year = parseInt(yMatch[1],10);
  // Find first month name
  const mMatch = str.match(/([A-Za-z]+)/g);
  let month = -1, day = 1;
  if(mMatch){
    for(const tok of mMatch){
      const k = tok.toLowerCase();
      if(MONTH_MAP[k] !== undefined){ month = MONTH_MAP[k]; break; }
    }
  }
  if(month < 0) return year + '-01-01';
  // First number after the month is the day
  const idx = str.toLowerCase().indexOf(Object.keys(MONTH_MAP).find(k => MONTH_MAP[k] === month && str.toLowerCase().includes(k)));
  const after = idx >= 0 ? str.slice(idx) : str;
  const dMatch = after.match(/\b(\d{1,2})\b/);
  if(dMatch) day = Math.min(31, Math.max(1, parseInt(dMatch[1],10)));
  const mm = String(month+1).padStart(2,'0');
  const dd = String(day).padStart(2,'0');
  return `${year}-${mm}-${dd}`;
}

function toggleSub(id){
  if(submitted.has(id)) submitted.delete(id);
  else { submitted.add(id); needSubmit.delete(id); }
  persist(); render();
}
function toggleNeed(id){
  if(needSubmit.has(id)) needSubmit.delete(id);
  else needSubmit.add(id);
  persist(); render();
}
function toggleSelected(id){
  if(selectedSet.has(id)) selectedSet.delete(id);
  else { selectedSet.add(id); submitted.add(id); needSubmit.delete(id); }
  persist(); render();
}
function toggleCal(id){
  if(inCalendar.has(id)) inCalendar.delete(id);
  else inCalendar.add(id);
  persist(); render();
}
function setSort(s, btn){
  if(currentSort === s && (s === 'dl' || s === 'ev')){
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortDir = 'asc';
  }
  currentSort = s;
  localStorage.setItem('rlb_sort', s);
  localStorage.setItem('rlb_sortdir', sortDir);
  syncSortButtons();
  render();
}
function syncSortButtons(){
  const dirArrow = sortDir === 'desc' ? ' ↓' : ' ↑';
  const labels = {dl:'Deadline', ev:'Event date', name:'Name'};
  document.querySelectorAll('.sb').forEach(b => {
    const bs = b.getAttribute('data-s');
    b.classList.toggle('active', bs === currentSort);
    b.textContent = labels[bs] + (bs === currentSort && bs !== 'name' ? dirArrow : '');
  });
}

function quickStatus(id, newStatus){
  const f = festivals.find(x=>x.id===id);
  if(!f) return;
  const isCustom = !!customFestivals.find(c=>c.id===id);
  if(isCustom){
    const idx = customFestivals.findIndex(c=>c.id===id);
    customFestivals[idx].status = newStatus;
  } else {
    if(!userEdits[id]) userEdits[id] = {};
    userEdits[id].status = newStatus;
  }
  persist(); rebuild();
}

/* ── EXPORT / IMPORT CHANGES ── */
function exportChanges(){
  const data = {
    version: 1,
    exported: new Date().toISOString(),
    submitted: [...submitted],
    needSubmit: [...needSubmit],
    selectedSet: [...selectedSet],
    inCalendar: [...inCalendar],
    userEdits,
    customFestivals,
    aiUpdates
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `rlb-tracker-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  const hint = document.getElementById('export-hint');
  if(hint){ hint.textContent = '✓ Exported'; setTimeout(()=>{ hint.textContent = ''; }, 3000); }
}
function importChanges(evt){
  const file = evt.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if(data.version !== 1) throw new Error('Unknown format');
      if(data.submitted) submitted = new Set(data.submitted);
      if(data.needSubmit) needSubmit = new Set(data.needSubmit);
      if(data.selectedSet) selectedSet = new Set(data.selectedSet);
      if(data.inCalendar) inCalendar = new Set(data.inCalendar);
      if(data.userEdits) userEdits = data.userEdits;
      if(data.customFestivals) customFestivals = data.customFestivals;
      if(data.aiUpdates) aiUpdates = data.aiUpdates;
      persist(); rebuild();
      const hint = document.getElementById('export-hint');
      if(hint){ hint.textContent = '✓ Imported successfully'; setTimeout(()=>{ hint.textContent = ''; }, 3000); }
    } catch(err) {
      alert('Import failed: ' + err.message);
    }
    evt.target.value = '';
  };
  reader.readAsText(file);
}

function saveEdit(){
  const id = document.getElementById('edit-id').value;
  const data = {
    name: document.getElementById('edit-name').value.trim(),
    loc: document.getElementById('edit-loc').value.trim(),
    region: document.getElementById('edit-region').value,
    dates: document.getElementById('edit-dates').value.trim(),
    dl: document.getElementById('edit-dl').value.trim(),
    dls: document.getElementById('edit-dls').value.trim() || '2099-01-01',
    status: document.getElementById('edit-status').value,
    tags: document.getElementById('edit-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
    url: document.getElementById('edit-url').value.trim(),
    notes: document.getElementById('edit-notes').value.trim(),
    src: document.getElementById('edit-src').value,
    verified: document.getElementById('edit-verified').checked
  };
  if(!data.name){ alert('Festival name is required.'); return; }
  const customIdx = customFestivals.findIndex(c=>c.id===id);
  const isStatic = STATIC_FESTIVALS.find(s=>s.id===id);
  if(customIdx >= 0){
    customFestivals[customIdx] = {id, ...customFestivals[customIdx], ...data};
  } else if(isStatic){
    userEdits[id] = data;
  } else {
    customFestivals.push({id, ...data});
  }
  persist(); closeEdit(); rebuild();
}
function deleteEntry(){
  const id = document.getElementById('edit-id').value;
  if(!confirm('Delete this festival entry? This only deletes entries you added yourself.')) return;
  customFestivals = customFestivals.filter(c=>c.id!==id);
  delete userEdits[id];
  submitted.delete(id);
  needSubmit.delete(id);
  persist(); closeEdit(); rebuild();
}

/* ── LIST FILTERING / SORTING ── */
const SO = {open:0,watch:1,closed:2,no:3};
function getList(){
  const q = (document.getElementById('srch')?.value||'').toLowerCase();
  // Submitted items only show in the "submitted" tab
  let list = festivals.filter(f=>!submitted.has(f.id));
  if(currentTab==='open') list = list.filter(f=>f.status==='open');
  else if(currentTab==='watch') list = list.filter(f=>f.status==='watch');
  else if(currentTab==='need') list = list.filter(f=>needSubmit.has(f.id));
  else if(currentTab==='csv') list = list.filter(f=>f.src==='csv'||f.src==='both');
  else if(currentTab==='dome') list = list.filter(f=>f.src==='dome');
  else if(currentTab==='submitted') list = festivals.filter(f=>submitted.has(f.id));
  // Status filter bar (only on tabs that show the full list)
  if(currentStatusFilter !== 'all' && !['open','watch','submitted','need'].includes(currentTab)){
    list = list.filter(f=>f.status===currentStatusFilter);
  }
  if(currentFilter!=='all' && !['submitted','need','calendar'].includes(currentTab)){
    list = list.filter(f=>f.region===currentFilter);
  }
  if(q) list = list.filter(f =>
    (f.name||'').toLowerCase().includes(q) ||
    (f.loc||'').toLowerCase().includes(q) ||
    (f.tags||[]).some(t=>t.toLowerCase().includes(q))
  );
  const dir = sortDir === 'desc' ? -1 : 1;
  list.sort((a,b)=>{
    if(currentTab==='all' && currentSort==='dl' && currentStatusFilter==='all'){
      const s = SO[a.status]-SO[b.status]; if(s!==0) return s;
    }
    if(currentSort==='ev'){
      return dir * eventDateFromDates(a.dates).localeCompare(eventDateFromDates(b.dates));
    }
    if(currentSort==='name'){
      return dir * (a.name||'').localeCompare(b.name||'');
    }
    return dir * (a.dls||'').localeCompare(b.dls||'');
  });
  return list;
}

/* ── HELPERS ── */
function cbCls(f,isSub){ if(isSub)return 'cb-sub'; return {open:'cb-open',watch:'cb-watch',closed:'cb-closed',no:'cb-no'}[f.status]||'cb-closed'; }
function badgeCls(f,isSub){ if(isSub)return 'b-sub'; return {open:'b-open',watch:'b-watch',closed:'b-closed',no:'b-no'}[f.status]||'b-closed'; }
function badgeLbl(f,isSub){ if(isSub)return 'Submitted'; if(f.status==='no')return 'Not accepting XR'; return f.dl; }
function csvBadgeCls(s,j){ if(s==='Disqualified')return 'b-disq'; if(j==='Selected')return 'b-selected'; if(j==='Not Selected')return 'b-notsel'; return 'b-open'; }
function csvBadgeLbl(s,j){ if(s==='Disqualified')return 'Disqualified'; if(j==='Selected')return '★ Selected'; if(j==='Not Selected')return 'Not Selected'; return 'In Consideration'; }
function esc(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

const STATUS_META = {
  open:  {lbl:'Open'},
  watch: {lbl:'Watchlist'},
  closed:{lbl:'Closed'},
  no:    {lbl:'No XR'}
};
function statusBtnsHTML(f){
  return `<div class="status-btns" onclick="event.stopPropagation()">
    ${Object.entries(STATUS_META).map(([k,v])=>`<button class="qs-btn${f.status===k?' qs-active-'+k:''}" onclick="quickStatus('${esc(f.id)}','${k}')">${v.lbl}</button>`).join('')}
  </div>`;
}
function cardHTML(f){
  const isSub = submitted.has(f.id);
  const isNeed = needSubmit.has(f.id);
  const isSel = selectedSet.has(f.id);
  const isCal = inCalendar.has(f.id);
  const isCustom = !!customFestivals.find(c=>c.id===f.id);
  const isEdited = !!userEdits[f.id] && !isCustom;
  const selBadge = isSel?`<span class="badge b-selected" style="font-size:10px;margin-left:5px">★ SELECTED</span>`:'';
  const tags = (f.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
  const aiHTML = f.aiNote?`<div class="ai-upd">◈ AI update: ${esc(f.aiNote)}</div>`:'';
  const awardsHTML = f.awards && f.awards.length ? `<div class="award-row">${f.awards.map(a=>`<span class="award-chip">🏆 ${esc(a.title)} — ${esc(a.fest)} ${esc(a.year)}</span>`).join('')}</div>` : '';
  const csvBadge = (f.src==='csv'||f.src==='both')?`<span class="badge b-csv">FilmFreeway</span>`:'';
  const pdfBadge = f.src==='pdf'?`<span class="badge" style="background:var(--teal-dim);color:var(--teal);font-size:9px;padding:1px 7px;margin-left:3px">Research list</span>`:'';
  const domeBadge = f.src==='dome'?`<span class="badge" style="background:var(--amber-dim);color:var(--amber);font-size:9px;padding:1px 7px;margin-left:3px">Dome</span>`:'';
  const customBadge = isCustom?`<span class="badge" style="background:var(--purple-dim);color:var(--purple);font-size:9px;padding:1px 7px;margin-left:3px">Custom</span>`:'';
  const editedBadge = isEdited?`<span class="badge" style="background:var(--teal-dim);color:var(--teal);font-size:9px;padding:1px 7px;margin-left:3px">Edited</span>`:'';
  const verif = f.verified?`<span class="vc ok">✓ verified</span>`:`<span class="vc">⚠ unverified</span>`;
  const csvRow = f.csv?`<div class="csvrow">
    <span class="badge ${csvBadgeCls(f.csv.status,f.csv.judging)}">${csvBadgeLbl(f.csv.status,f.csv.judging)}</span>
    <span>📅 ${esc(f.csv.submitted)}</span>
    <span>🔔 ${esc(f.csv.notification)}</span>
    <span class="tracking">#${esc(f.csv.tracking)}</span>
  </div>`:'';
  const highlight = f.csv?.judging==='Selected'?'border-color:rgba(59,130,246,0.4);':f.csv?.status==='Disqualified'?'border-color:rgba(229,62,62,0.35);':'';
  const portalLink = f.url ? `<a class="portal-link" href="${esc(f.url)}" target="_blank" rel="noopener">↗ Portal</a>` : '';
  const needBtnStyle = isNeed ? 'color:var(--amber);border-color:rgba(217,119,6,0.4);background:var(--amber-dim)' : '';
  const selBtnStyle = isSel ? 'color:var(--blue);border-color:rgba(59,130,246,0.45);background:var(--blue-dim)' : '';
  const calBtnStyle = isCal ? 'color:var(--teal);border-color:rgba(14,165,233,0.45);background:var(--teal-dim)' : '';
  const selHighlight = isSel ? 'border-color:rgba(59,130,246,0.55);box-shadow:0 0 0 1px rgba(59,130,246,0.25);' : highlight;
  const isCollapsed = collapsedAll ? 'collapsed' : '';
  const deadlineMini = f.dl && f.dl !== 'TBA' ? `<span style="color:var(--amber)">⏰ ${esc(f.dl)}</span>` : '';
  const datesMini = f.dates ? `<span>📅 ${esc(f.dates)}</span>` : '';
  return `<div class="card${isSub?' is-sub':''}${(f.src==='csv'||f.src==='both')?' from-csv':''} ${isCollapsed}" id="c-${esc(f.id)}" style="${selHighlight}">
  <div class="cb ${cbCls(f,isSub)}"></div>
  <div class="ct" onclick="toggleCardCollapse('${esc(f.id)}')">
    <div class="cn">${esc(f.name)}${selBadge}${csvBadge}${pdfBadge}${domeBadge}${customBadge}${editedBadge}</div>
    ${statusBtnsHTML(f)}
  </div>
  <div class="card-mini-info">${[datesMini,deadlineMini].filter(Boolean).join(' · ')}</div>
  <div class="cmeta"><strong>${esc(f.loc)}</strong> · 📅 ${esc(f.dates)} · ⏰ deadline: ${esc(f.dl)}</div>
  ${csvRow}
  <div class="tags">${tags}</div>
  ${awardsHTML}
  ${aiHTML}
  <p class="cnotes">${esc(f.notes)}</p>
  <div class="cf">
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${portalLink}
      <button class="sub-toggle" onclick="toggleSub('${esc(f.id)}')">${isSub?'✓ Submitted — undo':'+ Mark submitted'}</button>
      <button class="sub-toggle" onclick="toggleSelected('${esc(f.id)}')" style="${selBtnStyle}">${isSel?'★ Selected — undo':'☆ Mark selected'}</button>
      <button class="sub-toggle" onclick="toggleNeed('${esc(f.id)}')" style="${needBtnStyle}">${isNeed?'★ On to-submit list':'☆ Need to submit'}</button>
      <button class="sub-toggle" onclick="toggleCal('${esc(f.id)}')" style="${calBtnStyle}">${isCal?'📅 On calendar — remove':'📅 Add to calendar'}</button>
      <button class="sub-toggle" onclick="openEdit('${esc(f.id)}')">✎ Edit</button>
    </div>
    ${verif}
  </div>
</div>`;
}

/* ── CALENDAR ── */
function calendarHTML(){
  const today = new Date(); today.setHours(0,0,0,0);
  const events = [];
  // Only festivals you explicitly added to your calendar
  festivals.filter(f=>inCalendar.has(f.id)).forEach(f=>{
    // Submission deadline (skip if already submitted)
    if(!submitted.has(f.id) && f.dls && f.dls < '2099'){
      const d = new Date(f.dls + 'T00:00:00');
      if(!isNaN(d)) events.push({date:d, f, kind:'deadline'});
    }
    // Event date — useful to know when to attend any tracked festival
    const ev = eventDateFromDates(f.dates);
    if(ev && ev < '2099'){
      const d = new Date(ev + 'T00:00:00');
      if(!isNaN(d)) events.push({date:d, f, kind:'event'});
    }
  });
  events.sort((a,b)=>a.date - b.date);
  if(events.length === 0) return '<div class="empty-state">Your calendar is empty. Use the <strong>📅 Add to calendar</strong> button on any festival card to track its deadline and event date here.</div>';
  const groups = {};
  const order = [];
  events.forEach(e=>{
    const k = e.date.toLocaleString('en-GB',{month:'long',year:'numeric'});
    if(!groups[k]){ groups[k] = []; order.push(k); }
    groups[k].push(e);
  });
  let html = `<div class="cal-legend" style="display:flex;gap:14px;margin-bottom:14px;font-size:11px;color:var(--ink3)">
    <span><span style="display:inline-block;width:10px;height:10px;background:var(--green);border-radius:2px;margin-right:5px;vertical-align:middle"></span>Submission deadline</span>
    <span><span style="display:inline-block;width:10px;height:10px;background:var(--blue);border-radius:2px;margin-right:5px;vertical-align:middle"></span>★ Selected — event date</span>
  </div>`;
  order.forEach(month=>{
    html += `<div class="cal-month"><h3>${month}</h3>`;
    groups[month].forEach(({date,f,kind})=>{
      const isPast = date < today;
      const days = Math.round((date - today) / 86400000);
      const dayLbl = isPast ? `${Math.abs(days)} day${Math.abs(days)===1?'':'s'} ago` : days === 0 ? 'today' : `in ${days} day${days===1?'':'s'}`;
      const isNeed = needSubmit.has(f.id);
      const isEvent = kind === 'event';
      const needTag = isNeed ? `<span class="badge" style="background:var(--amber-dim);color:var(--amber);font-size:9px;padding:1px 7px;margin-left:6px">★ to submit</span>` : '';
      const evTag = isEvent ? `<span class="badge b-selected" style="font-size:9px;padding:1px 7px;margin-left:6px">★ SELECTED — event</span>` : '';
      const lineLbl = isEvent ? `🎬 Festival starts: ${esc(f.dates)}` : `⏰ Deadline: ${esc(f.dl)}`;
      const line2 = isEvent ? `📍 ${esc(f.loc)}` : `📅 Festival: ${esc(f.dates)} · 📍 ${esc(f.loc)}`;
      html += `<div class="cal-row${isPast?' past':''}${isEvent?' cal-event':''}">
        <div class="cal-date">
          <div class="cal-d">${date.getDate()}</div>
          <div class="cal-m">${date.toLocaleString('en-GB',{month:'short'})}</div>
        </div>
        <div class="cal-info">
          <div class="cal-name">${esc(f.name)}${evTag}${needTag}</div>
          <div class="cal-meta">${lineLbl} · <span class="cal-days">${dayLbl}</span></div>
          <div class="cal-meta-2">${line2}</div>
        </div>
        <button class="btn-icon" onclick="openEdit('${esc(f.id)}')" title="Edit">✎</button>
      </div>`;
    });
    html += '</div>';
  });
  return html;
}

/* ── RENDER ── */
function render(){
  const allNS = festivals.filter(f=>!submitted.has(f.id));
  const openC = allNS.filter(f=>f.status==='open').length;
  const watchC = allNS.filter(f=>f.status==='watch').length;
  const csvC = allNS.filter(f=>f.src==='csv'||f.src==='both').length;
  const subC = [...submitted].length;
  const needC = [...needSubmit].filter(id=>!submitted.has(id)).length;
  const domeC = allNS.filter(f=>f.src==='dome').length;
  const calC = inCalendar.size;
  const totalCSV = festivals.filter(f=>f.src==='csv'||f.src==='both').length;
  const selC = [...selectedSet].length;
  const consC = festivals.filter(f=>f.csv && f.csv.judging!=='Selected' && f.csv.judging!=='Not Selected' && f.csv.status!=='Disqualified').length;

  document.getElementById('c-dome').textContent = domeC;
  document.getElementById('c-all').textContent = allNS.length;
  document.getElementById('c-open').textContent = openC;
  document.getElementById('c-watch').textContent = watchC;
  document.getElementById('c-csv').textContent = csvC;
  document.getElementById('c-sub').textContent = subC;
  document.getElementById('c-need').textContent = needC;
  document.getElementById('c-cal').textContent = calC;

  // Status filter bar counts
  const closedC = allNS.filter(f=>f.status==='closed').length;
  const noC = allNS.filter(f=>f.status==='no').length;
  const sfAll = document.getElementById('sf-n-all');
  const sfOpen = document.getElementById('sf-n-open');
  const sfWatch = document.getElementById('sf-n-watch');
  const sfClosed = document.getElementById('sf-n-closed');
  const sfNo = document.getElementById('sf-n-no');
  if(sfAll) sfAll.textContent = allNS.length;
  if(sfOpen) sfOpen.textContent = openC;
  if(sfWatch) sfWatch.textContent = watchC;
  if(sfClosed) sfClosed.textContent = closedC;
  if(sfNo) sfNo.textContent = noC;
  const sfTotal = document.getElementById('sf-total');
  if(sfTotal) sfTotal.textContent = `${festivals.length} total`;
  // Restore active state on status filter buttons
  document.querySelectorAll('.sf-btn').forEach(b=>{
    b.classList.toggle('active', b.id === 'sf-' + currentStatusFilter);
  });

  const el = document.getElementById('list');
  const fr = document.getElementById('filter-row');
  fr.style.display = ['submitted','need','calendar'].includes(currentTab) ? 'none' : 'flex';
  const sb = document.getElementById('status-bar');
  if(sb) sb.style.display = ['submitted','calendar'].includes(currentTab) ? 'none' : 'flex';

  // Sync collapse button label
  const colBtn = document.getElementById('collapse-btn');
  if(colBtn) colBtn.textContent = collapsedAll ? '⊞ Expand all' : '⊟ Collapse all';
  syncSortButtons();

  // CALENDAR view
  if(currentTab === 'calendar'){
    el.innerHTML = `<div class="calendar-view">${calendarHTML()}</div>`;
    document.getElementById('sub-panel').style.display = 'none';
    return;
  }

  const list = getList();
  if(list.length === 0){
    el.innerHTML = '<div class="empty-state">No festivals match this view yet.</div>';
  } else if(currentTab === 'all'){
    let html = '', last = null;
    list.forEach(f=>{
      const s = f.status==='open'?'open':f.status==='watch'?'watch':f.status==='no'?'no':'closed';
      if(s !== last){
        last = s;
        const labels = {open:'Open now — submit today',watch:'Watch list — future deadlines',closed:'Closed / past deadlines',no:'Not accepting XR'};
        const cls = {open:'sh-open',watch:'sh-watch',closed:'sh-closed',no:'sh-no'}[s];
        html += `<div class="sh"><div class="sh-txt ${cls}">${labels[s]}</div><div class="sh-line"></div></div>`;
      }
      html += cardHTML(f);
    });
    el.innerHTML = html;
  } else {
    el.innerHTML = list.map(f=>cardHTML(f)).join('');
  }
}

/* ── AI REFRESH ── */
async function runAI(){
  const btn=document.getElementById('refresh-btn');
  const spin=document.getElementById('spin-icon');
  btn.disabled=true; spin.classList.add('active');
  document.getElementById('rlabel').textContent='Checking…';
  document.getElementById('overlay').classList.add('show');
  const pList=festivals.map(f=>`ID:${f.id}|${f.name}|${f.loc}|DL:${f.dl}|Status:${f.status}`).join('\n');
  const prompt=`Today: ${new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}. You are a film festival researcher.\n\nCheck this list of VR/XR immersive festivals. For any where the deadline, status or important info differs from what is recorded — or where you have meaningful new information — return an update.\n\n${pList}\n\nRespond ONLY with a JSON array (no markdown). Each element:\n{"id":"string","hasUpdate":true,"newDeadline":"string or null","newStatus":"open|watch|closed|no or null","newDls":"YYYY-MM-DD or null","note":"one sentence or null"}\nOnly include entries where hasUpdate is true. Return [] if nothing changed.`;
  try{
    document.getElementById('overlay-txt').textContent='Claude is checking all festival deadlines…';
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,messages:[{role:'user',content:prompt}]})});
    if(!r.ok)throw new Error(`API ${r.status}`);
    const d=await r.json();
    const raw=d.content.find(c=>c.type==='text')?.text||'[]';
    let ups; try{ups=JSON.parse(raw.replace(/```json|```/g,'').trim());}catch{ups=[];}
    let count=0;
    ups.forEach(u=>{
      if(!u.hasUpdate)return;
      const f=festivals.find(x=>x.id===u.id); if(!f)return;
      count++;
      if(u.newDeadline)f.dl=u.newDeadline;
      if(u.newDls)f.dls=u.newDls;
      if(u.newStatus)f.status=u.newStatus;
      if(u.note)f.aiNote=u.note;
      aiUpdates[u.id]={deadline:u.newDeadline,dls:u.newDls,status:u.newStatus,note:u.note};
    });
    localStorage.setItem('rlb_ai',JSON.stringify(aiUpdates));
    const now=new Date().toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    localStorage.setItem('rlb_ai_ts',now);
    document.getElementById('ai-ts').textContent=`AI refresh: ${now}`;
    const bar=document.getElementById('ai-bar');
    bar.className='ai-status ok';
    document.getElementById('ai-txt').textContent=count>0?`✓ ${count} update${count!==1?'s':''} — cards show ◈`:`✓ No changes as of ${now}`;
    render();
  }catch(e){
    document.getElementById('ai-bar').className='ai-status err';
    document.getElementById('ai-txt').textContent=`⚠ API error: ${e.message}`;
  }finally{
    btn.disabled=false; spin.classList.remove('active');
    document.getElementById('rlabel').textContent='AI check for updates';
    document.getElementById('overlay').classList.remove('show');
  }
}

const savedTS=localStorage.getItem('rlb_ai_ts');
if(savedTS && document.getElementById('ai-ts')) document.getElementById('ai-ts').textContent=`AI refresh: ${savedTS}`;
syncSortButtons();
rebuild();
</script>
